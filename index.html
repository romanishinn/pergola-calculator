<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aluprof Pergola Calculator 2026</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
  <div>
    <h1>🔧 Aluprof Pergola Calculator</h1>
    <div class="sub">Прайс-лист 2026 · Цены в € без НДС</div>
  </div>
  <div class="badge">2026</div>
</div>

<div class="container">
  <div class="grid">

    <!-- LEFT: Dimensions & System -->
    <div>
      <div class="card">
        <h2>Размеры и система</h2>

        <label>Ширина (вдоль стены / фасада), мм</label>
        <input type="number" id="width" value="3000" min="1000" max="15000" step="100" placeholder="напр. 3000">

        <label>Вынос (глубина от стены), мм</label>
        <input type="number" id="projection" value="7000" min="1000" max="7000" step="100" placeholder="напр. 4000">

        <label>Высота в свету (стандарт ~2500), мм</label>
        <input type="number" id="height" value="2500" min="1000" max="4000" step="100" placeholder="напр. 2500">

        <label>Тип монтажа</label>
        <select id="mounting">
          <option value="free">Отдельностоящая (Free-standing)</option>
          <option value="wall">Настенная (Wall-mounted)</option>
        </select>

        <label>Система (серия)</label>
        <select id="system">
          <option value="auto">⭐ Подобрать оптимальную</option>
          <option value="sb400">SB 400 (лопасти, вынос до 7000)</option>
          <option value="sb400r">SB 400R (лопасти, дренаж на сторону клиента)</option>
          <option value="sb550">SB 550 (лопасти премиум, ширина до 5000+)</option>
          <option value="sb450">SB 450 (лопасти, вынос до 6010)</option>
          <option value="solid">Solid (ткань Serge Ferrari)</option>
        </select>

        <div id="sb400-motor-row" class="hidden">
          <label>Вариант мотора (SB 400 / SB 400R)</label>
          <select id="sb400motor">
            <option value="visible">Мотор видимый (стандарт)</option>
            <option value="hidden">Мотор скрытый в балке (+10%)</option>
          </select>
        </div>
      </div>
    </div>

    <!-- RIGHT: Options -->
    <div>
      <div class="card">
        <h2>Опции и надбавки</h2>

        <label>Цвет конструкции и лопастей</label>
        <select id="color">
          <option value="standard">Стандарт Aluprof (включено)</option>
          <option value="ral">Цвет RAL вне палитры (+20%)</option>
          <option value="wood">Wood-like / дерево (+20%)</option>
        </select>

        <label style="margin-top:16px;">Дополнительные опции</label>
        <div class="checkbox-group">

          <label class="checkbox-item" id="lbl-led">
            <input type="checkbox" id="opt-led">
            <div>
              <div class="label-text">💡 LED освещение</div>
              <div class="label-desc">Базовый комплект: +869 € (фиксировано)</div>
            </div>
          </label>

          <label class="checkbox-item" id="lbl-led-pts">
            <input type="checkbox" id="opt-led-pts">
            <div>
              <div class="label-text">💡 Световые точки (LED points)</div>
              <div class="label-desc">Зависит от размера: 824–1255 € (расчёт автоматически)</div>
            </div>
          </label>

          <label class="checkbox-item">
            <input type="checkbox" id="opt-drain">
            <div>
              <div class="label-text">🌧 Дренаж в 1 стойку (4 водостока)</div>
              <div class="label-desc">Надбавка +10% к цене системы</div>
            </div>
          </label>

          <label class="checkbox-item">
            <input type="checkbox" id="opt-teleco">
            <div>
              <div class="label-text">📡 Контроллер Teleco (радио)</div>
              <div class="label-desc">Фиксированно +709 €</div>
            </div>
          </label>

        </div>

        <div class="info-box" style="margin-top:16px;">
          ℹ️ Все цены в € без НДС · Срок изготовления: 3–6 нед (SB350: 1 нед)
        </div>
      </div>
    </div>

  </div>

  <button class="btn-calc" onclick="calculate()">🔢 Рассчитать</button>

  <div class="result-section" id="results" style="display:none;"></div>
</div>

<script src="price-data.js"></script>
<script src="calculator.js"></script>
</body>
</html>
